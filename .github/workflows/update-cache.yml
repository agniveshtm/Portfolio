name: Update Repo Cache

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update cache
        run: |
          curl -sf "https://api.github.com/users/agniveshtm/repos?per_page=100&sort=updated&type=owner" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "User-Agent: portfolio-cache" > /tmp/repos.json

          echo '{}' > /tmp/tags.json
          for name in $(jq -r '.[] | select(.archived == false) | .name' /tmp/repos.json); do
            tag=$(curl -sf "https://api.github.com/repos/agniveshtm/$name/tags?per_page=1" \
              -H "Accept: application/vnd.github.v3+json" \
              -H "User-Agent: portfolio-cache" \
              | jq -r '.[0].name // ""')
            jq --arg name "$name" --arg tag "$tag" '. + {($name): $tag}' /tmp/tags.json > /tmp/tags.new.json
            mv /tmp/tags.new.json /tmp/tags.json
          done

          jq --slurpfile tags /tmp/tags.json '{
            repos: [.[] | select(.archived == false) | {
              name: .name,
              description: (.description // ""),
              language: (.language // ""),
              topics: (.topics // []),
              updatedAt: (.updated_at // ""),
              htmlUrl: (.html_url // ""),
              homepageUrl: (.homepage // ""),
              isFork: (.fork // false),
              isPrivate: (.private // false),
              isArchived: (.archived // false),
              latestTag: ($tags[0][.name] // "")
            }],
            fetchedAt: (now | todate),
            source: "rest"
          } | .count = (.repos | length)' /tmp/repos.json > cache.json

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache.json
          git diff --cached --quiet || git commit -m "chore: update repo cache [skip ci]"
          git push
